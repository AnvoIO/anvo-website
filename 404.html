<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0a0a0c">
    <title>Not found — Anvo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root { --bg:#0a0a0c; --fg:#f2f2f4; --muted:#6b6b74; }
        * { box-sizing:border-box; margin:0; padding:0; }
        html,body { height:100%; }
        body {
            background:var(--bg); color:var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display:grid; place-items:center; min-height:100dvh; padding:2rem; text-align:center;
        }
        .code { font-size: clamp(3rem, 10vw, 5rem); font-weight:700; letter-spacing:-0.02em; }
        p { color: var(--muted); margin-top: 0.5rem; }
        a { color: var(--fg); text-decoration:none; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom:1px; margin-top:1.5rem; display:inline-block; }
        a:hover { border-bottom-color: var(--fg); }
    </style>
</head>
<body>
    <div>
        <div class="code">404</div>
        <p>That page isn't here yet.</p>
        <a href="/">Back to home</a>
    </div>
</body>
</html>
